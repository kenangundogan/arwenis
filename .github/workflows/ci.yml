name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    # CI'a ozel, gecici MongoDB. Production DB'si CI'da KULLANILMAZ.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      # CI'a ozel placeholder degerler - gercek secret degildir.
      PAYLOAD_SECRET: ci-dummy-payload-secret-0123456789abcdef
      CRON_SECRET: ci-dummy-cron-secret-0123456789abcdef
      PREVIEW_SECRET: ci-dummy-preview-secret-0123456789abcdef
      DATABASE_URL: mongodb://127.0.0.1:27017/arwenis_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
